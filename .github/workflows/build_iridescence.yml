name: Build Iridescence

on:
  push:
    branches: [ main, ci ]
    paths-ignore: '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore: '**.md'
  repository_dispatch:
    types: [trigger-event]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ######## Iridescence ########
  build_iridescence_amd64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        CONFIG: [
          { "platform": "amd64", "ubuntu_image": "noble", "ubuntu_label": "ubuntu2404" },
          { "platform": "amd64", "ubuntu_image": "jammy", "ubuntu_label": "ubuntu2204" },
        ]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Docker login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Iridescence ${{ matrix.CONFIG.platform }} - ${{ matrix.CONFIG.ubuntu_image }}
        run: cd packages && ./build_iridescence.sh ${{ matrix.CONFIG.platform }} ${{ matrix.CONFIG.ubuntu_image }} ${{ matrix.CONFIG.ubuntu_label }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: iridescence-${{ matrix.CONFIG.platform }}-${{ matrix.CONFIG.ubuntu_label }}
          path: packages/${{ matrix.CONFIG.ubuntu_label }}/*
  
  build_iridescence_arm64:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        CONFIG: [
          { "platform": "arm64", "ubuntu_image": "noble", "ubuntu_label": "ubuntu2404" },
          { "platform": "arm64", "ubuntu_image": "jammy", "ubuntu_label": "ubuntu2204" },
        ]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Docker login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Iridescence ${{ matrix.CONFIG.platform }} - ${{ matrix.CONFIG.ubuntu_image }}
        run: cd packages && ./build_iridescence.sh ${{ matrix.CONFIG.platform }} ${{ matrix.CONFIG.ubuntu_image }} ${{ matrix.CONFIG.ubuntu_label }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: iridescence-${{ matrix.CONFIG.platform }}-${{ matrix.CONFIG.ubuntu_label }}
          path: packages/${{ matrix.CONFIG.ubuntu_label }}/*

  collect_artifacts:
    needs: [build_iridescence_amd64, build_iridescence_arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ppa
          submodules: recursive

      - name: Download ubuntu2404 artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: "*-ubuntu2404"
          path: ubuntu2404
          merge-multiple: true

      - name: Download ubuntu2204 artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: "*-ubuntu2204"
          path: ubuntu2204
          merge-multiple: true

      # Add packages in ubuntu2204 and ubuntu2404 to git repository
      - name: Add packages to PPA repository
        run: |
          git add ubuntu2404/* ubuntu2204/*
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git commit -m "Add Iridescence packages from build_iridescence workflow"
          git push origin ppa
  
      - name: Upload all packages
        uses: actions/upload-artifact@v6
        with:
          name: packages
          path: |
            ubuntu2404/*
            ubuntu2204/*

